<!-- layouts/partials/extend_head.html -->
<style>

  .home-background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    pointer-events: none;
    background-size: auto;
    background-position: center;
    background-repeat: repeat;
    opacity: 0.5;
    transition: background-image 0.3s ease;
  }

  html[data-theme="light"] .home-background,
  html:not([data-theme]) .home-background {
    background-image: url('/imgs/bg3.png');
  }

  html[data-theme="dark"] .home-background {
    background-image: url('/imgs/bg2.png');
  }
</style>
